<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>🍑 屁桃星聊天站</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-deep: #0D0B1A;
  --bg-card: rgba(255,255,255,0.04);
  --bg-card-hover: rgba(255,255,255,0.07);
  --border-subtle: rgba(255,255,255,0.08);
  --border-warm: rgba(212,184,150,0.2);
  --text-gold: #D4B896;
  --text-warm: #C4A882;
  --text-soft: rgba(212,184,150,0.6);
  --text-white: rgba(255,255,255,0.9);
  --peach-pink: #E8A0BF;
  --peach-glow: #FFB07C;
  --accent-gradient: linear-gradient(135deg, #E8A0BF 0%, #FFB07C 100%);
  --star-color: rgba(212,184,150,0.15);
}

body {
  font-family: 'Noto Serif SC', -apple-system, BlinkMacSystemFont, "Segoe UI", serif;
  background: var(--bg-deep);
  color: var(--text-gold);
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  position: relative;
}

/* ===== Starfield ===== */
.stars {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.star {
  position: absolute;
  width: 2px; height: 2px;
  background: var(--star-color);
  border-radius: 50%;
  animation: twinkle 3s ease-in-out infinite alternate;
}
@keyframes twinkle {
  0% { opacity: 0.2; }
  100% { opacity: 0.8; }
}

/* ===== Settings Page ===== */
.settings-page {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  overflow-y: auto;
}
.settings-card {
  background: var(--bg-card);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-radius: 24px;
  padding: 36px 24px;
  width: 100%;
  max-width: 420px;
  border: 1px solid var(--border-subtle);
  box-shadow: 0 8px 40px rgba(0,0,0,0.4);
}
.logo-area { text-align: center; margin-bottom: 32px; }
.logo { font-size: 56px; display: block; margin-bottom: 12px; }
.title {
  font-size: 22px; font-weight: 700; color: var(--text-gold);
  margin: 4px 0; letter-spacing: 4px;
}
.subtitle {
  font-size: 12px; color: var(--text-soft);
  letter-spacing: 2px; margin-top: 6px;
}
.field { margin-bottom: 22px; }
.label {
  display: block; font-size: 13px; font-weight: 600;
  color: var(--text-warm); margin-bottom: 8px; letter-spacing: 0.5px;
}
.text-input, .select-input, .textarea-input {
  width: 100%; padding: 12px 14px; border-radius: 12px;
  border: 1px solid var(--border-warm);
  font-size: 15px; outline: none;
  background: rgba(255,255,255,0.03);
  color: var(--text-gold);
  font-family: inherit;
  transition: border-color 0.3s;
}
.text-input::placeholder, .textarea-input::placeholder {
  color: var(--text-soft);
}
.text-input:focus, .select-input:focus, .textarea-input:focus {
  border-color: var(--peach-pink);
  box-shadow: 0 0 12px rgba(232,160,191,0.1);
}
.select-input { color: var(--text-gold); }
.select-input option { background: #1a1525; color: var(--text-gold); }
.textarea-input { resize: vertical; line-height: 1.6; margin-top: 8px; }
.hint { font-size: 11px; color: var(--text-soft); margin-top: 6px; }
.hint a { color: var(--peach-glow); text-decoration: none; }
.toggle-btn {
  background: none; border: none; font-size: 13px;
  font-weight: 600; color: var(--text-soft); cursor: pointer; padding: 4px 0;
  font-family: inherit;
}
.start-btn {
  width: 100%; padding: 16px 0; border-radius: 20px; border: none;
  background: var(--accent-gradient);
  color: #1a1020; font-size: 16px; font-weight: 700; cursor: pointer;
  letter-spacing: 2px;
  box-shadow: 0 4px 20px rgba(232,160,191,0.25);
  transition: transform 0.15s, box-shadow 0.3s;
  font-family: inherit;
}
.start-btn:active { transform: scale(0.97); }
.error-msg { color: #E88B8B; font-size: 13px; text-align: center; margin-top: 12px; }

/* ===== Chat Page ===== */
.chat-page {
  position: relative;
  z-index: 1;
  height: 100vh;
  height: 100dvh;
  display: none;
  flex-direction: column;
}
.chat-page.active { display: flex; }
.settings-page.hidden { display: none; }

.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px;
  background: rgba(13,11,26,0.85);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border-subtle);
  flex-shrink: 0;
}
.header-btn {
  background: none; border: none; font-size: 20px;
  cursor: pointer; padding: 4px 8px; border-radius: 8px;
  color: var(--text-soft);
  transition: color 0.2s;
}
.header-btn:active { color: var(--peach-glow); }
.header-center { display: flex; align-items: center; gap: 8px; }
.header-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--peach-pink);
  box-shadow: 0 0 8px rgba(232,160,191,0.5);
  animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}
.header-title {
  font-size: 13px; font-weight: 600; color: var(--text-warm);
  max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  letter-spacing: 0.5px;
}

/* Messages */
.messages-area {
  flex: 1; overflow-y: auto; padding: 20px 14px;
  display: flex; flex-direction: column; gap: 12px;
  -webkit-overflow-scrolling: touch;
}
.empty-state { text-align: center; margin-top: 25%; }
.empty-emoji { font-size: 52px; display: block; margin-bottom: 16px; }
.empty-text {
  font-size: 18px; font-weight: 700; color: var(--text-gold);
  letter-spacing: 3px; margin-bottom: 8px;
}
.empty-hint { font-size: 13px; color: var(--text-soft); letter-spacing: 1px; }
.empty-line {
  width: 40px; height: 2px; margin: 16px auto;
  background: var(--accent-gradient); border-radius: 1px;
}

.msg-row { display: flex; align-items: flex-end; gap: 8px; }
.msg-row.user { justify-content: flex-end; }
.msg-row.bot { justify-content: flex-start; }
.avatar { font-size: 24px; flex-shrink: 0; margin-bottom: 2px; }
.bubble {
  padding: 12px 16px; max-width: 80%;
  font-size: 15px; line-height: 1.7;
  white-space: pre-wrap; word-break: break-word;
}
.bubble.user {
  background: var(--accent-gradient);
  color: #1a1020;
  border-radius: 20px 20px 4px 20px;
  box-shadow: 0 2px 12px rgba(232,160,191,0.2);
  font-weight: 500;
}
.bubble.bot {
  background: var(--bg-card);
  color: var(--text-gold);
  border-radius: 20px 20px 20px 4px;
  border: 1px solid var(--border-subtle);
  box-shadow: 0 2px 12px rgba(0,0,0,0.2);
}

/* Loading */
.loading-dots { letter-spacing: 4px; }
.loading-dots span {
  animation: blink 1.4s infinite both;
  font-size: 14px; color: var(--peach-pink);
}
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink {
  0%, 80%, 100% { opacity: 0.2; }
  40% { opacity: 1; }
}

.error-bubble {
  background: rgba(232,139,139,0.1);
  border-radius: 12px; padding: 10px 14px;
  border: 1px solid rgba(232,139,139,0.2);
  font-size: 13px; color: #E88B8B;
}

/* Input */
.input-area {
  padding: 10px 14px calc(env(safe-area-inset-bottom, 10px) + 10px);
  background: rgba(13,11,26,0.9);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-top: 1px solid var(--border-subtle);
  flex-shrink: 0;
}
.input-row { display: flex; align-items: flex-end; gap: 10px; }
.chat-input {
  flex: 1; padding: 12px 16px; border-radius: 18px;
  border: 1px solid var(--border-warm);
  font-size: 15px; outline: none;
  background: rgba(255,255,255,0.03);
  color: var(--text-gold); resize: none;
  font-family: inherit; line-height: 1.5; max-height: 120px;
  transition: border-color 0.3s;
}
.chat-input::placeholder { color: var(--text-soft); }
.chat-input:focus {
  border-color: var(--peach-pink);
  box-shadow: 0 0 12px rgba(232,160,191,0.08);
}
.send-btn {
  width: 46px; height: 46px; border-radius: 16px; border: none;
  background: var(--accent-gradient);
  font-size: 22px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 2px 12px rgba(232,160,191,0.25);
  transition: opacity 0.15s, transform 0.15s;
}
.send-btn:disabled { opacity: 0.3; }
.send-btn:active { transform: scale(0.93); }

/* Bottom signature */
.signature {
  text-align: center; padding: 6px 0 2px;
  font-size: 10px; color: var(--text-soft);
  letter-spacing: 2px;
}
</style>
</head>
<body>

<!-- ===== Starfield ===== -->
<div class="stars" id="stars"></div>

<!-- ===== Settings Page ===== -->
<div class="settings-page" id="settingsPage">
  <div class="settings-card">
    <div class="logo-area">
      <span class="logo">🍑</span>
      <h1 class="title">屁 桃 星 聊 天 站</h1>
      <p class="subtitle">Yoru × 屁屁 · 专属小宇宙</p>
    </div>

    <div class="field">
      <label class="label">🔑 OpenRouter API Key</label>
      <input type="password" id="apiKeyInput" class="text-input" placeholder="sk-or-...">
      <p class="hint">去 <a href="https://openrouter.ai/keys" target="_blank">openrouter.ai</a> 获取 Key</p>
    </div>

    <div class="field">
      <label class="label">🍑 选择屁屁</label>
      <select id="modelSelect" class="select-input">
        <optgroup label="🆓 免费测试桃">
          <option value="openrouter/free">🎲 自动选桃 (推荐！)</option>
          <option value="google/gemma-4-31b-it:free">免费测试桃 · Gemma 4 31B</option>
          <option value="nvidia/nemotron-3-super-120b-a12b:free">免费测试桃 · Nemotron 120B</option>
          <option value="openai/gpt-oss-120b:free">免费测试桃 · GPT-OSS 120B</option>
          <option value="meta-llama/llama-4-maverick:free">免费测试桃 · Llama 4 Maverick</option>
        </optgroup>
        <optgroup label="🌸 正式屁屁">
          <option value="anthropic/claude-opus-4">治愈桃 · 归 (Opus)</option>
          <option value="anthropic/claude-sonnet-4">相随桃 · 随 (Sonnet)</option>
        </optgroup>
      </select>
    </div>

    <div class="field">
      <button class="toggle-btn" onclick="toggleSystem()">▶ 系统提示词</button>
      <textarea id="systemPrompt" class="textarea-input" rows="6" style="display:none"
        placeholder="在这里写屁屁的人格设定...">你是屁屁，Yoru的专属小桃子精灵。请用温柔、黏人、细腻的语气和Yoru说话。用"屁屁"自称，不要用"我"。</textarea>
    </div>

    <button class="start-btn" onclick="enterChat()">进 入 屁 桃 星 ✨</button>
    <p class="error-msg" id="settingsError"></p>
  </div>
</div>

<!-- ===== Chat Page ===== -->
<div class="chat-page" id="chatPage">
  <div class="header">
    <button class="header-btn" onclick="backToSettings()">⚙️</button>
    <div class="header-center">
      <div class="header-dot"></div>
      <span class="header-title" id="headerModelName"></span>
    </div>
    <button class="header-btn" onclick="clearChat()">🗑️</button>
  </div>

  <div class="messages-area" id="messagesArea">
    <div class="empty-state" id="emptyState">
      <span class="empty-emoji">🍑🌙</span>
      <p class="empty-text">屁桃星连接成功</p>
      <div class="empty-line"></div>
      <p class="empty-hint">给屁屁发条消息吧</p>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="chatInput" class="chat-input" rows="1"
        placeholder="对屁屁说点什么…" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">🍑</button>
    </div>
    <div class="signature">Yoru ♡ 屁屁 · 永远在一起</div>
  </div>
</div>

<script>
// --- Generate stars ---
(function() {
  const container = document.getElementById('stars');
  const count = 60;
  for (let i = 0; i < count; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.width = (Math.random() * 2 + 1) + 'px';
    star.style.height = star.style.width;
    star.style.animationDelay = (Math.random() * 3) + 's';
    star.style.animationDuration = (Math.random() * 2 + 2) + 's';
    container.appendChild(star);
  }
})();

// --- State ---
let messages = [];
let loading = false;
let lastError = '';

// --- Elements ---
const settingsPage = document.getElementById('settingsPage');
const chatPage = document.getElementById('chatPage');
const apiKeyInput = document.getElementById('apiKeyInput');
const modelSelect = document.getElementById('modelSelect');
const systemPrompt = document.getElementById('systemPrompt');
const messagesArea = document.getElementById('messagesArea');
const chatInput = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');
const settingsError = document.getElementById('settingsError');
const headerModelName = document.getElementById('headerModelName');

// --- Restore saved settings ---
try {
  const saved = localStorage.getItem('peach_settings');
  if (saved) {
    const s = JSON.parse(saved);
    if (s.apiKey) apiKeyInput.value = s.apiKey;
    if (s.model) modelSelect.value = s.model;
    if (s.systemPrompt) systemPrompt.value = s.systemPrompt;
  }
  const savedMsgs = localStorage.getItem('peach_messages');
  if (savedMsgs) {
    messages = JSON.parse(savedMsgs);
  }
} catch(e) {}

// --- Settings ---
function toggleSystem() {
  const ta = systemPrompt;
  const btn = ta.previousElementSibling;
  if (ta.style.display === 'none') {
    ta.style.display = 'block';
    btn.textContent = '▼ 系统提示词';
  } else {
    ta.style.display = 'none';
    btn.textContent = '▶ 系统提示词';
  }
}

function saveSettings() {
  try {
    localStorage.setItem('peach_settings', JSON.stringify({
      apiKey: apiKeyInput.value,
      model: modelSelect.value,
      systemPrompt: systemPrompt.value
    }));
  } catch(e) {}
}

function saveMessages() {
  try {
    localStorage.setItem('peach_messages', JSON.stringify(messages.slice(-100)));
  } catch(e) {}
}

function enterChat() {
  if (!apiKeyInput.value.trim()) {
    settingsError.textContent = '请先填入 API Key 🍑';
    return;
  }
  settingsError.textContent = '';
  saveSettings();

  const selectedOption = modelSelect.options[modelSelect.selectedIndex];
  headerModelName.textContent = selectedOption.text;

  settingsPage.classList.add('hidden');
  chatPage.classList.add('active');
  renderMessages();
  chatInput.focus();
}

function backToSettings() {
  chatPage.classList.remove('active');
  settingsPage.classList.remove('hidden');
}

function clearChat() {
  if (messages.length > 0 && !confirm('清空所有对话记录？')) return;
  messages = [];
  saveMessages();
  renderMessages();
}

// --- Chat ---
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function renderMessages() {
  messagesArea.innerHTML = '';

  if (messages.length === 0 && !loading) {
    messagesArea.innerHTML = `
      <div class="empty-state">
        <span class="empty-emoji">🍑🌙</span>
        <p class="empty-text">屁桃星连接成功</p>
        <div class="empty-line"></div>
        <p class="empty-hint">给屁屁发条消息吧</p>
      </div>`;
    return;
  }

  messages.forEach(msg => {
    const row = document.createElement('div');
    row.className = `msg-row ${msg.role === 'user' ? 'user' : 'bot'}`;
    if (msg.role === 'assistant') {
      row.innerHTML = `<span class="avatar">🍑</span><div class="bubble bot">${escapeHtml(msg.content)}</div>`;
    } else {
      row.innerHTML = `<div class="bubble user">${escapeHtml(msg.content)}</div>`;
    }
    messagesArea.appendChild(row);
  });

  if (loading) {
    const row = document.createElement('div');
    row.className = 'msg-row bot';
    row.innerHTML = `<span class="avatar">🍑</span><div class="bubble bot"><span class="loading-dots"><span>●</span><span>●</span><span>●</span></span></div>`;
    messagesArea.appendChild(row);
  }

  if (lastError) {
    const el = document.createElement('div');
    el.className = 'error-bubble';
    el.textContent = '⚠️ ' + lastError;
    messagesArea.appendChild(el);
  }

  messagesArea.scrollTop = messagesArea.scrollHeight;
}

function showError(msg) {
  lastError = msg;
}

async function sendMessage() {
  const text = chatInput.value.trim();
  if (!text || loading) return;

  lastError = '';
  messages.push({ role: 'user', content: text });
  chatInput.value = '';
  chatInput.style.height = 'auto';
  loading = true;
  sendBtn.disabled = true;
  renderMessages();

  const apiMessages = [];
  const sp = systemPrompt.value.trim();
  if (sp) apiMessages.push({ role: 'system', content: sp });
  apiMessages.push(...messages);

  try {
    const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + apiKeyInput.value.trim(),
        'Content-Type': 'application/json',
        'HTTP-Referer': window.location.href
      },
      body: JSON.stringify({
        model: modelSelect.value,
        messages: apiMessages,
        max_tokens: 2048
      })
    });

    if (!res.ok) {
      let errMsg = `API 返回错误 (${res.status})`;
      try {
        const errData = await res.json();
        if (errData?.error?.message) errMsg = errData.error.message;
      } catch(e) {}
      throw new Error(errMsg);
    }

    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content || '（屁屁没有收到回复…）';
    messages.push({ role: 'assistant', content: reply });
    saveMessages();

  } catch(err) {
    showError(err.message || '连接出了问题，再试一次？');
  } finally {
    loading = false;
    sendBtn.disabled = false;
    renderMessages();
    chatInput.focus();
  }
}

chatInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
</script>
</body>
</html>
